<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="돌멩이 다이어트">
<meta name="theme-color" content="#ffffff">
<title>돌멩이 다이어트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root {
  --green:#1D9E75; --green-light:#E1F5EE; --green-dark:#0F6E56;
  --blue:#378ADD; --red:#E24B4A; --red-light:#FCEBEB;
  --bg:#f8f8f6; --card:#ffffff;
  --text:#1a1a1a; --text2:#555; --text3:#999;
  --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.06);
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;}
.header{background:var(--card);border-bottom:1px solid var(--border2);padding:16px 20px 12px;position:sticky;top:0;z-index:100;}
.header-title{font-size:17px;font-weight:700;}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.page{display:none;padding:16px;}
.page.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border2);}
.card-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.05em;margin-bottom:10px;text-transform:uppercase;}
input[type="date"]{font-family:inherit;font-size:16px;font-weight:700;color:var(--text);border:none;background:none;flex:1;}
.weight-big{display:flex;align-items:baseline;gap:6px;}
input.weight-in{font-family:inherit;font-size:36px;font-weight:700;color:var(--text);border:none;background:none;width:110px;}
.weight-kg{font-size:18px;color:var(--text3);}
.w-badge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;}
.diff-d{background:var(--green-light);color:var(--green-dark);}
.diff-u{background:var(--red-light);color:var(--red);}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.meal-item label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px;}
.meal-item input{font-family:inherit;font-size:14px;color:var(--text);border:none;border-bottom:1px solid var(--border);background:none;width:100%;padding:4px 0;}
.meal-item input:focus{outline:none;border-bottom-color:var(--green);}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;color:var(--text2);background:none;cursor:pointer;font-family:inherit;transition:all .15s;}
.chip.on{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500;}
.min-row{display:flex;align-items:center;gap:8px;}
.min-row label{font-size:13px;color:var(--text3);}
.min-row input{font-family:inherit;font-size:15px;color:var(--text);border:none;border-bottom:1px solid var(--border);background:none;width:55px;text-align:center;padding:4px 0;}
.min-row input:focus{outline:none;border-bottom-color:var(--green);}
.water-dots{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.wd{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;transition:all .15s;}
.wd.on{background:var(--blue);border-color:var(--blue);}
.water-cnt{font-size:13px;color:var(--text3);margin-top:8px;}
textarea.memo{font-family:inherit;font-size:14px;color:var(--text);border:none;background:none;width:100%;resize:none;line-height:1.7;}
textarea.memo:focus{outline:none;}
.save-btn{width:100%;padding:15px;border-radius:var(--radius);background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:4px;}
.save-btn:active{opacity:.8;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.nav-btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;}
.nav-label{font-size:14px;font-weight:700;color:var(--text);}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.metric{background:var(--card);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border2);}
.metric-l{font-size:11px;color:var(--text3);margin-bottom:4px;}
.metric-v{font-size:22px;font-weight:700;color:var(--text);}
.metric-u{font-size:11px;color:var(--text3);}
.chart-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;border:1px solid var(--border2);}
.chart-lbl{font-size:11px;color:var(--text3);margin-bottom:10px;font-weight:500;letter-spacing:.05em;}
.day-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.day-scroll::-webkit-scrollbar{display:none;}
.dc{min-width:72px;background:var(--card);border-radius:var(--radius-sm);padding:10px 8px;border:1px solid var(--border2);flex-shrink:0;}
.dc.has{border-color:rgba(29,158,117,.3);}
.dc.today{border-color:var(--green);border-width:1.5px;}
.dc-day{font-size:11px;color:var(--text3);margin-bottom:2px;}
.dc-date{font-size:11px;color:var(--text2);margin-bottom:6px;}
.dc-wt{font-size:15px;font-weight:700;color:var(--text);}
.dc-diff{font-size:10px;margin-bottom:4px;}
.dc-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.dc-dot{width:6px;height:6px;border-radius:50%;}
.dot-g{background:var(--green);}
.dot-b{background:var(--blue);}
.dot-p{background:#7F77DD;}
.dot-o{background:#D85A30;}
.dc-empty{font-size:10px;color:var(--text3);margin-top:6px;}
.det-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border2);margin-bottom:12px;}
.det-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);}
.det-row:last-child{border-bottom:none;}
.dr-d{font-size:13px;font-weight:700;min-width:60px;color:var(--text);}
.dr-info{font-size:12px;color:var(--text2);line-height:1.7;}
.dr-wt{font-size:14px;font-weight:700;color:var(--green);}
.leg-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
.leg-dot{width:8px;height:8px;border-radius:50%;}
.copy-btn{width:100%;padding:13px;border-radius:var(--radius);border:1px solid var(--border);background:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;margin-bottom:12px;}
.empty-msg{text-align:center;padding:30px 0;font-size:14px;color:var(--text3);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.cal-head{text-align:center;font-size:11px;color:var(--text3);font-weight:500;padding:4px 0;}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--text2);background:var(--card);border:1px solid var(--border2);}
.cal-cell.has{border-color:rgba(29,158,117,.4);background:var(--green-light);}
.cal-cell.today{border-color:var(--green);border-width:1.5px;font-weight:700;}
.cal-cell.empty{background:none;border-color:transparent;}
.cc-num{font-size:12px;font-weight:500;}
.cc-w{font-size:9px;color:var(--green-dark);}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-name{font-size:12px;color:var(--text2);min-width:60px;}
.bar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--green);}
.bar-val{font-size:12px;color:var(--text3);min-width:28px;text-align:right;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border2);display:flex;padding:8px 0 20px;z-index:100;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;font-family:inherit;padding:4px 0;}
.bn-icon{font-size:20px;}
.bn-lbl{font-size:10px;color:var(--text3);font-weight:500;}
.bn.active .bn-lbl{color:var(--green);}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🪨 돌멩이 다이어트</div>
  <div class="header-sub">오늘도 조금씩, 단단하게</div>
</div>

<!-- 오늘 기록 -->
<div id="page-log" class="page active">
  <div class="card">
    <div class="card-label">날짜</div>
    <input type="date" id="log-date" />
  </div>
  <div class="card">
    <div class="card-label">공복 체중</div>
    <div class="weight-big">
      <input class="weight-in" type="number" id="weight" step="0.1" placeholder="65.0" inputmode="decimal" />
      <span class="weight-kg">kg</span>
      <span id="w-diff"></span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">식단</div>
    <div class="meal-grid">
      <div class="meal-item"><label>아침</label><input type="text" id="m-b" placeholder="먹은 것" /></div>
      <div class="meal-item"><label>점심</label><input type="text" id="m-l" placeholder="먹은 것" /></div>
      <div class="meal-item"><label>저녁</label><input type="text" id="m-d" placeholder="먹은 것" /></div>
      <div class="meal-item"><label>간식</label><input type="text" id="m-s" placeholder="먹은 것" /></div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">운동</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="chip" id="chip-stretch" onclick="toggleChip(this)">🧘 스트레칭</button>
        <div class="min-row" style="flex:1;justify-content:flex-end">
          <input type="number" id="ex-stretch" placeholder="0" inputmode="numeric" />
          <label>분</label>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="chip" id="chip-strength" onclick="toggleChip(this)">💪 근력</button>
        <div class="min-row" style="flex:1;justify-content:flex-end">
          <input type="number" id="ex-strength" placeholder="0" inputmode="numeric" />
          <label>분</label>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="chip" id="chip-cardio" onclick="toggleChip(this)">🏃 유산소</button>
        <div class="min-row" style="flex:1;justify-content:flex-end">
          <input type="number" id="ex-cardio" placeholder="0" inputmode="numeric" />
          <label>분</label>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">수분 섭취</div>
    <div class="water-dots" id="water-dots"></div>
    <div class="water-cnt" id="water-cnt">0잔 / 8잔</div>
  </div>
  <div class="card">
    <div class="card-label">오늘의 한 줄</div>
    <textarea class="memo" id="memo" rows="2" placeholder="오늘 컨디션이나 느낀 점"></textarea>
  </div>
  <button class="save-btn" onclick="saveLog()">기록 저장</button>
</div>

<!-- 주간 요약 -->
<div id="page-week" class="page">
  <div class="nav-row">
    <button class="nav-btn" onclick="changeWeek(-1)">← 이전</button>
    <span class="nav-label" id="wn-label"></span>
    <button class="nav-btn" onclick="changeWeek(1)">다음 →</button>
  </div>
  <div class="sum-grid">
    <div class="metric"><div class="metric-l">시작 체중</div><div class="metric-v" id="ws-start">-</div><div class="metric-u">kg</div></div>
    <div class="metric"><div class="metric-l">마지막 체중</div><div class="metric-v" id="ws-end">-</div><div class="metric-u">kg</div></div>
    <div class="metric"><div class="metric-l">주간 변화</div><div class="metric-v" id="ws-diff">-</div><div class="metric-u">kg</div></div>
    <div class="metric"><div class="metric-l">운동한 날</div><div class="metric-v" id="ws-exd">-</div><div class="metric-u">/ 7일</div></div>
  </div>
  <div class="chart-card">
    <div class="chart-lbl">체중 변화</div>
    <div style="position:relative;width:100%;height:150px;">
      <canvas id="wChart" role="img" aria-label="주간 체중 변화">주간 체중 변화</canvas>
    </div>
  </div>
  <div class="day-scroll" id="day-scroll"></div>
  <div class="leg-row">
    <div class="leg"><div class="leg-dot dot-g"></div>운동</div>
    <div class="leg"><div class="leg-dot dot-b"></div>식단</div>
    <div class="leg"><div class="leg-dot dot-p"></div>수분</div>
    <div class="leg"><div class="leg-dot dot-o"></div>메모</div>
  </div>
  <div class="det-card" id="week-detail"></div>
  <button class="copy-btn" onclick="copyWeek()">주간 결산 텍스트 복사</button>
</div>

<!-- 월간 결산 -->
<div id="page-month" class="page">
  <div class="nav-row">
    <button class="nav-btn" onclick="changeMonth(-1)">← 이전</button>
    <span class="nav-label" id="mn-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">다음 →</button>
  </div>
  <div class="sum-grid">
    <div class="metric"><div class="metric-l">월 시작 체중</div><div class="metric-v" id="ms-start">-</div><div class="metric-u">kg</div></div>
    <div class="metric"><div class="metric-l">월 마지막 체중</div><div class="metric-v" id="ms-end">-</div><div class="metric-u">kg</div></div>
    <div class="metric"><div class="metric-l">월간 변화</div><div class="metric-v" id="ms-diff">-</div><div class="metric-u">kg</div></div>
    <div class="metric"><div class="metric-l">운동한 날</div><div class="metric-v" id="ms-exd">-</div><div class="metric-u">일</div></div>
    <div class="metric"><div class="metric-l">기록한 날</div><div class="metric-v" id="ms-logged">-</div><div class="metric-u">일</div></div>
    <div class="metric"><div class="metric-l">평균 수분</div><div class="metric-v" id="ms-water">-</div><div class="metric-u">잔/일</div></div>
  </div>
  <div class="chart-card">
    <div class="chart-lbl">월간 체중 변화</div>
    <div style="position:relative;width:100%;height:160px;">
      <canvas id="mChart" role="img" aria-label="월간 체중 변화">월간 체중 변화</canvas>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-lbl">운동 종류별 횟수</div>
    <div id="m-ex-bars"><div class="empty-msg">운동 기록이 없어요</div></div>
  </div>
  <div class="card" style="margin-bottom:12px;">
    <div class="card-label">월간 달력</div>
    <div class="cal-grid" id="cal-heads"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <button class="copy-btn" onclick="copyMonth()">월간 결산 텍스트 복사</button>
</div>

<!-- 하단 네비 -->
<div class="bottom-nav">
  <button class="bn active" id="bn-log" onclick="switchPage('log')">
    <span class="bn-icon">📝</span><span class="bn-lbl">오늘 기록</span>
  </button>
  <button class="bn" id="bn-week" onclick="switchPage('week')">
    <span class="bn-icon">📊</span><span class="bn-lbl">주간 요약</span>
  </button>
  <button class="bn" id="bn-month" onclick="switchPage('month')">
    <span class="bn-icon">📅</span><span class="bn-lbl">월간 결산</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DAYS=['일','월','화','수','목','금','토'];
let weekOffset=0, monthOffset=0, waterCount=0;
let wChart=null, mChart=null;
let autoSaveTimer=null;

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function getRecords(){try{return JSON.parse(localStorage.getItem('diet_log')||'[]');}catch(e){return[];}}
function saveRecords(r){localStorage.setItem('diet_log',JSON.stringify(r));}
function showToast(msg,dur=2000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

/* ── 핵심: 날짜에 해당하는 기록을 폼에 채워넣기 ── */
function loadLogForDate(date){
  const recs=getRecords();
  const rec=recs.find(r=>r.date===date)||null;

  // 체중
  document.getElementById('weight').value=rec&&rec.weight?rec.weight:'';
  // 식단
  document.getElementById('m-b').value=rec?.breakfast||'';
  document.getElementById('m-l').value=rec?.lunch||'';
  document.getElementById('m-d').value=rec?.dinner||'';
  document.getElementById('m-s').value=rec?.snack||'';
  // 운동 칩 & 각 운동 분
  const exMap = rec?.exMap || {};
  ['stretch','strength','cardio'].forEach(key => {
    const chip = document.getElementById('chip-' + key);
    const inp  = document.getElementById('ex-' + key);
    if (chip) chip.classList.toggle('on', !!exMap[key]);
    if (inp)  inp.value = exMap[key] || '';
  });
  // 하위 호환: 이전 데이터(exercise 배열) 처리
  if (!rec?.exMap && rec?.exercise) {
    const map = {'스트레칭':'stretch','근력':'strength','유산소':'cardio'};
    rec.exercise.forEach(e => {
      const key = map[e.replace(/[🧘💪🏃 ]/g,'').trim()];
      if (key) { document.getElementById('chip-'+key)?.classList.add('on'); }
    });
  }
  // 운동 시간 (이전 데이터 호환)
  if (!rec?.exMap && rec?.exMin) {
    const onChips = ['stretch','strength','cardio'].filter(k => document.getElementById('chip-'+k)?.classList.contains('on'));
    if (onChips.length === 1) document.getElementById('ex-'+onChips[0]).value = rec.exMin;
  }
  // 수분
  waterCount=rec?.water||0;
  document.querySelectorAll('.wd').forEach((el,idx)=>el.classList.toggle('on',idx<waterCount));
  document.getElementById('water-cnt').textContent=waterCount
    ?`${waterCount}잔 / 8잔 (약 ${(waterCount*0.2).toFixed(1)}L)`
    :'0잔 / 8잔';
  // 메모
  document.getElementById('memo').value=rec?.memo||'';
  // 체중 뱃지
  updateWeightBadge(date, rec?.weight||null);
}

function updateWeightBadge(date, val){
  const v=parseFloat(val);
  const el=document.getElementById('w-diff');
  if(isNaN(v)){el.textContent='';return;}
  const prev=getRecords().filter(r=>r.date<date&&r.weight).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(prev){const d=(v-prev.weight).toFixed(1);el.className='w-badge '+(d<0?'diff-d':d>0?'diff-u':'');el.textContent=`${d<0?'▼':d>0?'▲':'—'} ${Math.abs(d)}kg`;}
  else el.textContent='';
}

/* 날짜 바뀔 때 해당 날짜 기록 불러오기 */
document.getElementById('log-date').addEventListener('change',function(){
  loadLogForDate(this.value);
});

/* 체중 입력 시 뱃지 업데이트 */
document.getElementById('weight').addEventListener('input',function(){
  updateWeightBadge(document.getElementById('log-date').value, this.value);
  scheduleAutoSave();
});

/* 모든 입력 필드에 자동저장 연결 */
['m-b','m-l','m-d','m-s','memo','ex-stretch','ex-strength','ex-cardio'].forEach(id=>{
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', scheduleAutoSave);
});

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{
    const date=document.getElementById('log-date').value;
    const weight=document.getElementById('weight').value;
    if(!date||!weight) return; // 날짜+체중 없으면 자동저장 안 함
    doSave(true);
  }, 1200); // 1.2초 후 자동저장
}

/* 수분 도트 생성 */
const wdWrap=document.getElementById('water-dots');
for(let i=0;i<8;i++){
  const d=document.createElement('button');
  d.className='wd';
  d.onclick=()=>{
    waterCount=i+1;
    document.querySelectorAll('.wd').forEach((el,idx)=>el.classList.toggle('on',idx<waterCount));
    document.getElementById('water-cnt').textContent=`${waterCount}잔 / 8잔 (약 ${(waterCount*0.2).toFixed(1)}L)`;
    scheduleAutoSave();
  };
  wdWrap.appendChild(d);
}

function toggleChip(el){
  el.classList.toggle('on');
  scheduleAutoSave();
}

/* 실제 저장 로직 */
function doSave(isAuto=false){
  const date=document.getElementById('log-date').value;
  const weight=document.getElementById('weight').value;
  if(!date||!weight){if(!isAuto)showToast('날짜와 체중은 필수예요!');return;}
  // 운동별 분 저장
  const exMap = {};
  ['stretch','strength','cardio'].forEach(key => {
    const chip = document.getElementById('chip-' + key);
    const inp  = document.getElementById('ex-' + key);
    if (chip?.classList.contains('on')) exMap[key] = parseInt(inp?.value) || 0;
  });
  const exTotal = Object.values(exMap).reduce((s,v) => s+v, 0);

  const rec={
    date, weight:parseFloat(weight),
    breakfast:document.getElementById('m-b').value,
    lunch:document.getElementById('m-l').value,
    dinner:document.getElementById('m-d').value,
    snack:document.getElementById('m-s').value,
    exercise:Object.keys(exMap),
    exMap,
    exMin:exTotal,
    water:waterCount,
    memo:document.getElementById('memo').value
  };
  const recs=getRecords().filter(r=>r.date!==date);
  recs.push(rec);recs.sort((a,b)=>b.date.localeCompare(a.date));
  saveRecords(recs);
  if(isAuto) showToast('자동저장 됐어요 ✓', 1500);
  else showToast('저장됐어요! ✓');
}

function saveLog(){ doSave(false); }

function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('bn-'+name).classList.add('active');
  if(name==='week')renderWeek();
  if(name==='month')renderMonth();
  if(name==='log') loadLogForDate(document.getElementById('log-date').value);
}

/* ── 앱 시작: 오늘 날짜 세팅 후 기록 불러오기 ── */
document.getElementById('log-date').value=todayStr();
loadLogForDate(todayStr());

function getWeekDates(offset){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-day+1+offset*7);
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);}
  return dates;
}

function changeWeek(dir){weekOffset+=dir;renderWeek();}

function renderWeek(){
  const dates=getWeekDates(weekOffset);
  const recs=getRecords();const rm={};recs.forEach(r=>rm[r.date]=r);
  const fmt=d=>{const[,m,dd]=d.split('-');return `${m}.${dd}`;};
  document.getElementById('wn-label').textContent=`${fmt(dates[0])} — ${fmt(dates[6])}`;
  const wr=dates.map(d=>rm[d]||null);
  const wd=wr.filter(r=>r&&r.weight);
  const start=wd.length?wd[0].weight:null,end=wd.length?wd[wd.length-1].weight:null;
  const diff=start&&end?(end-start).toFixed(1):null;
  const exd=wr.filter(r=>r&&r.exercise&&r.exercise.length).length;
  document.getElementById('ws-start').textContent=start?start.toFixed(1):'-';
  document.getElementById('ws-end').textContent=end?end.toFixed(1):'-';
  const de=document.getElementById('ws-diff');
  if(diff!==null){de.textContent=(diff>0?'+':'')+diff;de.style.color=diff<0?'#0F6E56':diff>0?'#E24B4A':'';}
  else{de.textContent='-';de.style.color='';}
  document.getElementById('ws-exd').textContent=exd;
  if(wChart)wChart.destroy();
  wChart=new Chart(document.getElementById('wChart'),{type:'line',data:{labels:dates.map((_,i)=>DAYS[(i+1)%7]),datasets:[{data:dates.map(d=>rm[d]?.weight||null),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',pointBackgroundColor:'#1D9E75',pointRadius:4,tension:0.3,spanGaps:true,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v.toFixed(1),font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
  const today=todayStr();
  const scroll=document.getElementById('day-scroll');scroll.innerHTML='';
  dates.forEach((d,i)=>{
    const r=rm[d];const[,mm,dd]=d.split('-');
    const el=document.createElement('div');
    el.className='dc'+(r?' has':'')+(d===today?' today':'');
    let h=`<div class="dc-day">${DAYS[(i+1)%7]}</div><div class="dc-date">${mm}/${dd}</div>`;
    if(r&&r.weight){
      h+=`<div class="dc-wt">${r.weight.toFixed(1)}</div>`;
      const prev=dates[i-1]?rm[dates[i-1]]:null;
      if(prev&&prev.weight){const dv=(r.weight-prev.weight).toFixed(1);h+=`<div class="dc-diff" style="color:${dv<0?'#0F6E56':dv>0?'#E24B4A':'#999'}">${dv<0?'▼':dv>0?'▲':'—'}${Math.abs(dv)}</div>`;}
      h+='<div class="dc-dots">';
      if(r.exercise&&r.exercise.length)h+='<div class="dc-dot dot-g"></div>';
      if(r.breakfast||r.lunch||r.dinner)h+='<div class="dc-dot dot-b"></div>';
      if(r.water>0)h+='<div class="dc-dot dot-p"></div>';
      if(r.memo)h+='<div class="dc-dot dot-o"></div>';
      h+='</div>';
    }else h+='<div class="dc-empty">미기록</div>';
    el.innerHTML=h;scroll.appendChild(el);
  });
  const det=document.getElementById('week-detail');
  const filled=dates.filter(d=>rm[d]);
  if(!filled.length){det.innerHTML='<div class="empty-msg">이번 주 기록이 없어요</div>';return;}
  det.innerHTML=filled.map(d=>{
    const r=rm[d];const[,mm,dd]=d.split('-');const di=dates.indexOf(d);const dn=DAYS[(di+1)%7];
    const meals=[r.breakfast&&`아침 ${r.breakfast}`,r.lunch&&`점심 ${r.lunch}`,r.dinner&&`저녁 ${r.dinner}`,r.snack&&`간식 ${r.snack}`].filter(Boolean).join(' · ')||'식단 미기록';
    const ex=r.exercise?.length?`${r.exercise.map(k=>{const NM={stretch:'스트레칭',strength:'근력',cardio:'유산소'};const min=r.exMap?.[k];return (NM[k]||k)+(min?'('+min+'분)':'');}).join(' + ')}`:'운동 없음';
    return `<div class="det-row"><div><div class="dr-d">${mm}/${dd}(${dn})</div><div class="dr-wt">${r.weight?r.weight.toFixed(1)+'kg':'-'}</div></div><div class="dr-info">${meals}<br>${ex} · 수분 ${r.water}잔${r.memo?'<br>'+r.memo:''}</div></div>`;
  }).join('');
}

function copyWeek(){
  const dates=getWeekDates(weekOffset);const recs=getRecords();const rm={};recs.forEach(r=>rm[r.date]=r);
  const fmt=d=>{const[,m,dd]=d.split('-');return `${m}.${dd}`;};
  const lines=[`[${fmt(dates[0])} ~ ${fmt(dates[6])} 주간 기록]`,''];
  dates.forEach((d,i)=>{
    const r=rm[d];const[,mm,dd]=d.split('-');const dn=DAYS[(i+1)%7];
    if(!r){lines.push(`${mm}/${dd}(${dn}) — 미기록`);return;}
    const meals=[r.breakfast,r.lunch,r.dinner,r.snack].filter(Boolean).join(' / ')||'-';
    const ex=r.exercise?.length?`${r.exercise.map(k=>{const NM={stretch:'스트레칭',strength:'근력',cardio:'유산소'};const min=r.exMap?.[k];return (NM[k]||k)+(min?'('+min+'분)':'');}).join(' + ')}`:'운동 없음';
    lines.push(`${mm}/${dd}(${dn}) ${r.weight?r.weight.toFixed(1)+'kg':'-'}`);
    lines.push(`식단: ${meals}`);lines.push(`운동: ${ex} · 수분: ${r.water}잔`);
    if(r.memo)lines.push(`메모: ${r.memo}`);lines.push('');
  });
  copyText(lines.join('\n'));
}

function getMonthInfo(offset){
  const now=new Date();const first=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const last=new Date(now.getFullYear(),now.getMonth()+offset+1,0);
  const dates=[];
  for(let d=1;d<=last.getDate();d++)dates.push(`${first.getFullYear()}-${pad(first.getMonth()+1)}-${pad(d)}`);
  return{dates,year:first.getFullYear(),month:first.getMonth()+1,firstDay:first.getDay(),daysInMonth:last.getDate()};
}

function changeMonth(dir){monthOffset+=dir;renderMonth();}

function renderMonth(){
  const{dates,year,month,firstDay,daysInMonth}=getMonthInfo(monthOffset);
  const recs=getRecords();const rm={};recs.forEach(r=>rm[r.date]=r);
  document.getElementById('mn-label').textContent=`${year}년 ${month}월`;
  const mr=dates.map(d=>rm[d]||null);
  const wd=mr.filter(r=>r&&r.weight);
  const start=wd.length?wd[0].weight:null,end=wd.length?wd[wd.length-1].weight:null;
  const diff=start&&end?(end-start).toFixed(1):null;
  const exd=mr.filter(r=>r&&r.exercise&&r.exercise.length).length;
  const logged=mr.filter(r=>r).length;
  const avgW=logged?(mr.filter(r=>r).reduce((s,r)=>s+(r.water||0),0)/logged).toFixed(1):'-';
  document.getElementById('ms-start').textContent=start?start.toFixed(1):'-';
  document.getElementById('ms-end').textContent=end?end.toFixed(1):'-';
  const de=document.getElementById('ms-diff');
  if(diff!==null){de.textContent=(diff>0?'+':'')+diff;de.style.color=diff<0?'#0F6E56':diff>0?'#E24B4A':'';}
  else{de.textContent='-';de.style.color='';}
  document.getElementById('ms-exd').textContent=exd;
  document.getElementById('ms-logged').textContent=logged;
  document.getElementById('ms-water').textContent=avgW;
  if(mChart)mChart.destroy();
  mChart=new Chart(document.getElementById('mChart'),{type:'line',data:{labels:dates.map(d=>parseInt(d.split('-')[2])+'일'),datasets:[{data:dates.map(d=>rm[d]?.weight||null),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',pointBackgroundColor:'#1D9E75',pointRadius:2,tension:0.3,spanGaps:true,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v.toFixed(1),font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:9},maxTicksLimit:10,autoSkip:true},grid:{display:false}}}}});
  const exCount={};
  mr.filter(r=>r&&r.exercise).forEach(r=>r.exercise.forEach(e=>{if(e)exCount[e]=(exCount[e]||0)+1;}));
  const exSorted=Object.entries(exCount).sort((a,b)=>b[1]-a[1]);
  const barsEl=document.getElementById('m-ex-bars');
  if(!exSorted.length){barsEl.innerHTML='<div class="empty-msg">운동 기록이 없어요</div>';}
  else{const maxEx=exSorted[0][1];barsEl.innerHTML=exSorted.map(([name,cnt])=>`<div class="bar-row"><span class="bar-name">${name}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxEx*100)}%"></div></div><span class="bar-val">${cnt}회</span></div>`).join('');}
  document.getElementById('cal-heads').innerHTML=DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('');
  const today=todayStr();let cells='';
  for(let i=0;i<firstDay;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${pad(month)}-${pad(d)}`;const r=rm[ds];
    cells+=`<div class="cal-cell${r?' has':''}${ds===today?' today':''}"><span class="cc-num">${d}</span>${r&&r.weight?`<span class="cc-w">${r.weight.toFixed(1)}</span>`:''}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=cells;
}

function copyMonth(){
  const{dates,year,month}=getMonthInfo(monthOffset);
  const recs=getRecords();const rm={};recs.forEach(r=>rm[r.date]=r);
  const filled=dates.filter(d=>rm[d]);
  if(!filled.length){showToast('이번 달 기록이 없어요');return;}
  const mr=dates.map(d=>rm[d]||null);
  const wd=mr.filter(r=>r&&r.weight);
  const start=wd.length?wd[0].weight:null,end=wd.length?wd[wd.length-1].weight:null;
  const diff=start&&end?(end-start).toFixed(1):null;
  const exd=mr.filter(r=>r&&r.exercise&&r.exercise.length).length;
  const lines=[`[${year}년 ${month}월 월간 결산]`,'',`시작 체중: ${start?start.toFixed(1)+' kg':'-'}`,`마지막 체중: ${end?end.toFixed(1)+' kg':'-'}`,`월간 변화: ${diff!==null?(diff>0?'+':'')+diff+' kg':'-'}`,`운동한 날: ${exd}일 / 기록한 날: ${filled.length}일`,'','--- 일별 기록 ---',''];
  filled.forEach(d=>{
    const r=rm[d];const[,mm,dd]=d.split('-');const dn=DAYS[new Date(d).getDay()];
    const meals=[r.breakfast,r.lunch,r.dinner,r.snack].filter(Boolean).join(' / ')||'-';
    const ex=r.exercise?.length?`${r.exercise.map(k=>{const NM={stretch:'스트레칭',strength:'근력',cardio:'유산소'};const min=r.exMap?.[k];return (NM[k]||k)+(min?'('+min+'분)':'');}).join(' + ')}`:'운동 없음';
    lines.push(`${mm}/${dd}(${dn}) ${r.weight?r.weight.toFixed(1)+'kg':'-'} | ${ex} | 수분 ${r.water}잔`);
    lines.push(`식단: ${meals}`);if(r.memo)lines.push(`메모: ${r.memo}`);lines.push('');
  });
  copyText(lines.join('\n'));
}

function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>showToast('복사됐어요!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('복사됐어요!');
  });
}
</script>
